input:
  transitions_path: ../data/processed/transitions_hourly_mimiccode.csv

db:
  host: localhost
  port: 5432
  name: mimic
  user_env: PGUSER
  password_env: PGPASSWORD
  schemas:
    hosp_typed: mimiciv_hosp_typed
    hosp_fallback: mimiciv_hosp

label:
  readmit_days: 30

output:
  episode_table_path: ../data/processed/readmission_episode.csv
  report_dir: ../reports/readmission
  prefix: readmission

model:
  kind: logreg
  max_iter: 1000
  c: 1.0
  random_state: 42

features:
  include:
    - episode_hours
    - last_s_t_sofa
    - last_s_t_mbp
    - last_s_t_heart_rate
    - last_s_t_resp_rate
    - last_s_t_spo2
    - last_s_t_gcs
    - last_s_t_urine_output_rate
    - last_s_t_oxygen_delivery
    - last_s_t_creatinine
    - last_s_t_bun
    - last_s_t_age
    - last_s_t_charlson
    - mean_s_t_sofa
    - mean_s_t_mbp
    - mean_s_t_heart_rate
    - mean_s_t_resp_rate
    - mean_s_t_spo2
    - mean_s_t_gcs
    - mean_s_t_urine_output_rate
    - mean_s_t_oxygen_delivery
    - mean_s_t_creatinine
    - mean_s_t_bun
    - mean_s_t_age
    - mean_s_t_charlson
    - min_s_t_mbp
    - max_s_t_sofa
    - delta_s_t_sofa
    - delta_s_t_mbp
    - frac_vaso
    - frac_vent
    - frac_crrt
    - any_vaso
    - any_vent
    - any_crrt

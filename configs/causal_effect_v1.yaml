input:
  transitions_path: ../data/processed/transitions_v1_1.csv

output:
  report_dir: ../reports/causal_effect_v1
  prefix: effect_v1

analysis:
  estimand: ATE
  include_actions:
    - A_HIGH_SUPPORT
    - A_LOW_SUPPORT
  exclude_actions:
    - A_UNKNOWN
    - A_TERMINAL
  outcome_col: within_30d_next_admit
  treatment_high_label: A_HIGH_SUPPORT
  treatment_low_label: A_LOW_SUPPORT
  covariates_numeric:
    - s_t_lace
    - s_t_age
    - s_t_comorbidity
    - s_t_acuity
    - s_t_length
    - s_t_physical_status
  covariates_categorical:
    - s_t_admission_type

propensity:
  model: logistic
  max_iter: 2000
  C: 1.0

weights:
  stabilized: true
  clip_percentiles:
    - 0.01
    - 0.99

bootstrap:
  n_resamples: 500
  seed: 42
  store_replicates_csv: false


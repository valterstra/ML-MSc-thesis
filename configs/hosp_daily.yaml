db:
  host: localhost
  port: 5432
  name: mimic
  user_env: PGUSER
  password_env: PGPASSWORD

schemas:
  hosp: mimiciv_hosp
  icu: mimiciv_icu
  derived: mimiciv_derived

cohort:
  min_age: 18
  exclude_in_hospital_deaths: false

split:
  train: 0.70
  valid: 0.15
  test: 0.15
  seed: 42

sample:
  n_episodes: 5000
  seed: 42

output:
  dir: data/processed
  filename: hosp_daily_transitions.csv
  sample_filename: hosp_daily_transitions_sample5k.csv

lab_fill_limits:
  tier1: 2
  tier2: 3
  albumin: 5

lactate_threshold: 2.0

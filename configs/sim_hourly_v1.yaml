input:
  transitions_path: ../data/processed/transitions_v3_mimiccode_hourly.csv
  episode_table_path: ../data/processed/readmission_episode_v1.csv

output:
  report_dir: ../reports/sim_hourly_v1
  prefix: sim_hourly_v1

state:
  features_numeric:
    - s_t_sofa
    - s_t_mbp
    - s_t_heart_rate
    - s_t_resp_rate
    - s_t_spo2
    - s_t_creatinine
    - s_t_bun
    - s_t_age
    - s_t_charlson

actions:
  components: [a_t_vaso, a_t_vent, a_t_crrt]
  policies:
    - observed_random
    - no_treatment
    - always_vaso
    - always_vent
    - always_crrt
    - all_treatments

simulation:
  max_steps: 72
  n_rollouts_per_policy: 500
  seed: 42
  done_threshold: 0.5

dynamics_model:
  kind: ridge
  alpha: 1.0

readmission_model:
  max_iter: 2000
  c: 1.0
  random_state: 42
  features:
    - episode_hours
    - last_s_t_sofa
    - last_s_t_mbp
    - last_s_t_heart_rate
    - last_s_t_resp_rate
    - last_s_t_spo2
    - last_s_t_creatinine
    - last_s_t_bun
    - last_s_t_age
    - last_s_t_charlson
    - mean_s_t_sofa
    - mean_s_t_mbp
    - mean_s_t_heart_rate
    - mean_s_t_resp_rate
    - mean_s_t_spo2
    - mean_s_t_creatinine
    - mean_s_t_bun
    - mean_s_t_age
    - mean_s_t_charlson
    - min_s_t_mbp
    - max_s_t_sofa
    - delta_s_t_sofa
    - delta_s_t_mbp
    - frac_vaso
    - frac_vent
    - frac_crrt
    - any_vaso
    - any_vent
    - any_crrt

input:
  transitions_path: ../data/processed/transitions_v1_1.csv

output:
  report_dir: ../reports/sim_v1
  prefix: sim_v1

data:
  allowed_actions:
    - A_LOW_SUPPORT
    - A_HIGH_SUPPORT
  eval_split: test

model:
  type: logistic
  weighting: none
  weight_include_actions:
    - A_LOW_SUPPORT
    - A_HIGH_SUPPORT
  weight_treatment_high_label: A_HIGH_SUPPORT
  weight_clip_percentiles:
    - 0.01
    - 0.99
  weight_stabilized: true
  features_numeric:
    - s_t_lace
    - s_t_age
    - s_t_comorbidity
    - s_t_acuity
    - s_t_length
    - s_t_physical_status
  features_categorical:
    - s_t_admission_type
  max_iter: 2000
  C: 1.0

reward:
  cost_low: 0.0
  cost_high: 0.05

simulation:
  n_episodes: 10000
  seed: 42

policies:
  risk_threshold: 0.25
